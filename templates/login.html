<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-background"></div>
    
    <div class="login-container">
        <!-- Login Card -->
        <div class="login-card">
            <div class="login-icon">💰</div>
            <h1 class="login-title">Expense Tracker</h1>
            <p class="login-subtitle">Track your spending smarter</p>
            
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}
            
            <form method="POST" class="login-form">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" 
                           class="form-input" placeholder="Enter username" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" 
                           class="form-input" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="login-button">Login to Dashboard</button>
            </form>
            
            <!-- Demo Credentials -->
            <div class="demo-box">
                <h3 class="demo-title">🔓 Demo Credentials</h3>
                <div class="demo-item">
                    <span class="demo-label">Username:</span>
                    <code class="demo-code">demo</code>
                </div>
                <div class="demo-item">
                    <span class="demo-label">Password:</span>
                    <code class="demo-code">password123</code>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
